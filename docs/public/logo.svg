<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#3eaf7c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#grad)" stroke-width="6" opacity="0.9"/>
  <!-- Inner dashed ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="url(#grad)" stroke-width="2" stroke-dasharray="8 6" opacity="0.5"/>
  <!-- W letter with gradient -->
  <text x="100" y="122" font-family="Arial Black, Arial, sans-serif" font-size="72" font-weight="900" fill="url(#grad)" text-anchor="middle" filter="url(#glow)">W</text>
  <!-- Small dots representing tech nodes -->
  <circle cx="100" cy="20" r="4" fill="#3eaf7c" opacity="0.8"/>
  <circle cx="180" cy="100" r="4" fill="#667eea" opacity="0.8"/>
  <circle cx="100" cy="180" r="4" fill="#764ba2" opacity="0.8"/>
  <circle cx="20" cy="100" r="4" fill="#667eea" opacity="0.8"/>
</svg>
